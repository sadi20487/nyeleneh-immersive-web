<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Web Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Landing Page -->
    <section id="landing" class="screen active">
        <h1 id="landing-msg"></h1>
        <button id="runaway-btn">MASUK</button>
    </section>

    <!-- Tab 1 -->
    <section id="tab1" class="screen hidden">
        <div class="content">
            <p class="quote">"Hanya ada satu hal yang membuat mimpi tidak mungkin tercapai: ketakutan akan kegagalan. Jangan biarkan hari kemarin merenggut terlalu banyak hari ini."</p>
            <button id="to-tab2-btn" class="arrow-btn">↓</button>
        </div>
    </section>

    <!-- Tab 2 -->
    <section id="tab2" class="screen hidden">
        <div class="content">
            <p id="nyeleneh-text">Kamu luar biasa, selalu memberikan yang terbaik dalam segala hal.</p>
            <button id="nyeleneh-btn">Oke, sekarang lihat sisi lain kamu...</button>
        </div>
    </section>

    <!-- Tab 3 -->
    <section id="tab3" class="screen hidden">
        <div id="polaroid-container"></div>
        <div id="polaroid-modal" class="hidden">
            <div class="modal-content">
                <button id="close-modal-btn">X</button>
                <img id="modal-img" src="" alt="Zoomed Polaroid">
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
